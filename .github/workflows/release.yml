name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version (e.g. 1.2.3)'
        required: true
        type: string
      create_tag:
        description: 'Create and push git tag v{version}'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_tag == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build-web:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync package version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: node scripts/sync-version.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Archive web dist
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ARCHIVE="white-noise-mixer-web-v${VERSION}.zip"
          cd dist && zip -r "../${ARCHIVE}" .
          cd ..
          echo "WEB_ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            dist
            white-noise-mixer-web-v${{ needs.resolve-version.outputs.version }}.zip

  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Sync package version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: node scripts/sync-version.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: npm run build && npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          APK_NAME="white-noise-mixer-v${VERSION}-android.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: white-noise-mixer-v${{ needs.resolve-version.outputs.version }}-android.apk

  deploy-pages:
    needs: [resolve-version, build-web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    needs: [resolve-version, build-web, build-android, deploy-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: White Noise Mixer ${{ needs.resolve-version.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/web-dist/white-noise-mixer-web-v${{ needs.resolve-version.outputs.version }}.zip
            release-assets/android-apk/white-noise-mixer-v${{ needs.resolve-version.outputs.version }}-android.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
